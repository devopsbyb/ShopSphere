{% extends "base.html" %}

{% block title %}
Payment
{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Complete Your Payment</h3>
            </div>

            <div class="card-body">

                <h5>Order ID: {{ order.id }}</h5>

                <hr>

                <div class="d-flex justify-content-between mb-3">
                    <strong>Total Amount</strong>
                    <strong class="text-success">
                        ₹{{ order.total_amount }}
                    </strong>
                </div>

                <button id="rzp-button" class="btn btn-success w-100 btn-lg">
                    Pay ₹{{ order.total_amount }}
                </button>

                <form
                    id="payment-success-form"
                    action="/payment-success/{{ order.id }}"
                    method="POST">

                    <input
                        type="hidden"
                        name="razorpay_payment_id"
                        id="razorpay_payment_id">

                    <input
                        type="hidden"
                        name="razorpay_order_id"
                        id="razorpay_order_id">

                    <input
                        type="hidden"
                        name="razorpay_signature"
                        id="razorpay_signature">

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

var options = {

    key: "{{ razorpay_key }}",

    amount: "{{ order.total_amount * 100 }}",

    currency: "INR",

    name: "ShopSphere",

    description: "Order Payment",

    image: "https://razorpay.com/favicon.png",

    order_id: "{{ razorpay_order_id }}",

    handler: function (response) {

        document.getElementById("razorpay_payment_id").value =
            response.razorpay_payment_id;

        document.getElementById("razorpay_order_id").value =
            response.razorpay_order_id;

        document.getElementById("razorpay_signature").value =
            response.razorpay_signature;

        document.getElementById("payment-success-form").submit();

    },

    theme: {
        color: "#0d6efd"
    }

};

var rzp = new Razorpay(options);

document.getElementById("rzp-button").onclick = function(e) {

    rzp.open();

    e.preventDefault();

}

</script>

{% endblock %}
