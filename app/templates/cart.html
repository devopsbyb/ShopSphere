<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>
</head>
<body>

<h1>Shopping Cart</h1>

{% if cart_items %}

<ul>

{% for item in cart_items %}

    <li>
        Product ID: {{ item.product_id }}
        |
        Quantity: {{ item.quantity }}
    </li>

{% endfor %}

</ul>

{% else %}

<p>Your cart is empty.</p>

{% endif %}

</body>
</html>
