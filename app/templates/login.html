{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white text-center">
                <h3 class="mb-0">Login</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter your password"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

                <hr>

                <p class="text-center mb-0">

                    Don't have an account?

                    <a href="/register">
                        Register Here
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
