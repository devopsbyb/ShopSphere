{% extends "base.html" %}

{% block title %}
Products
{% endblock %}

{% block content %}

<h1 class="mb-4 text-center">🛍️ ShopSphere Products</h1>

<div class="row">

    {% for product in products %}

    <div class="col-lg-4 col-md-6 mb-4">

        <div class="card h-100 shadow-sm">

            <img src="{{ product.image }}"
                 class="card-img-top"
                 alt="{{ product.name }}"
                 style="height:250px; object-fit:cover;">

            <div class="card-body d-flex flex-column">

                <h4 class="card-title">
                    {{ product.name }}
                </h4>

                <p class="card-text text-muted">
                    {{ product.description }}
                </p>

                <h5 class="text-success mt-auto">
                    ₹{{ product.price }}
                </h5>

                <span class="badge bg-secondary mb-3">
                    Stock: {{ product.stock }}
                </span>

                <form action="{{ url_for('add_to_cart', product_id=product.id) }}"
                      method="POST">

                    <button type="submit"
                            class="btn btn-primary w-100">
                        🛒 Add to Cart
                    </button>

                </form>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
