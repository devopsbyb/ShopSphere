{% extends "base.html" %}

{% block title %}
Edit Address - ShopSphere
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header">
                    <h3 class="mb-0">Edit Delivery Address</h3>
                </div>

                <div class="card-body">

                    <form action="/edit-address/{{ address.id }}" method="POST">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input
                                type="text"
                                class="form-control"
                                name="full_name"
                                value="{{ address.full_name }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input
                                type="text"
                                class="form-control"
                                name="phone_number"
                                value="{{ address.phone_number }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address Line 1</label>
                            <input
                                type="text"
                                class="form-control"
                                name="line1"
                                value="{{ address.line1 }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address Line 2</label>
                            <input
                                type="text"
                                class="form-control"
                                name="line2"
                                value="{{ address.line2 }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address Line 3 (Optional)</label>
                            <input
                                type="text"
                                class="form-control"
                                name="line3"
                                value="{{ address.line3 }}">
                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">City</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    name="city"
                                    value="{{ address.city }}"
                                    required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">State</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    name="state"
                                    value="{{ address.state }}"
                                    required>
                            </div>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Pincode</label>
                            <input
                                type="text"
                                class="form-control"
                                name="pincode"
                                value="{{ address.pincode }}"
                                required>
                        </div>

                        <div class="form-check mb-4">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="is_default"
                                name="is_default"
                                {% if address.is_default %}checked{% endif %}>

                            <label class="form-check-label" for="is_default">
                                Set as Default Address
                            </label>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="/addresses" class="btn btn-secondary">
                                Cancel
                            </a>

                            <button type="submit" class="btn btn-primary">
                                Update Address
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
