{% extends "base.html" %}

{% block title %}
Admin Login
{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <h2 class="text-center mb-4">
        Admin Login
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label>Email</label>

            <input
                type="email"
                name="email"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Password</label>

            <input
                type="password"
                name="password"
                class="form-control"
                required>

        </div>

        <button class="btn btn-dark w-100">
            Login
        </button>

    </form>

</div>

{% endblock %}
