<!DOCTYPE html>
<html>

<head>
    <title>Checkout</title>
</head>

<body>

<h1>Checkout</h1>

{% for item in cart_items %}

<div>

    <h3>{{ item.product.name }}</h3>

    <p>Price : ₹{{ item.product.price }}</p>

    <p>Quantity : {{ item.quantity }}</p>

    <p>
        Subtotal :
        ₹{{ item.product.price * item.quantity }}
    </p>

    <hr>

</div>

{% endfor %}

<h2>Total : ₹{{ total }}</h2>

<a href="/add-address">
    <button type="button">
        Continue to Delivery Address
    </button>
</a>

</body>

</html>
